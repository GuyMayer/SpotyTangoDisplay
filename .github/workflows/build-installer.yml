name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis /DROOT="${{ github.workspace }}" installer\setup.nsi
        shell: pwsh

      - name: Delete old releases (keep latest only)
        run: |
          $tags = gh release list --json tagName --jq '.[].tagName' | Where-Object { $_ -match '^build-' }
          foreach ($tag in $tags) {
            gh release delete $tag --yes --cleanup-tag 2>$null
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      - name: Create GitHub Release and upload EXE
        run: |
          $tag = "build-${{ github.run_number }}"
          gh release create $tag `
            --title "Build ${{ github.run_number }} (${{ github.sha }})" `
            --notes "Auto-built installer (build #${{ github.run_number }}, commit ${{ github.sha }})." `
            --latest `
            SpotyTangoDisplay-Setup.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

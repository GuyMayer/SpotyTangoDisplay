name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis /DROOT="${{ github.workspace }}" installer\setup.nsi
        shell: pwsh

      - name: Delete existing release (if any)
        run: |
          gh release delete latest --yes --cleanup-tag 2>$null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      - name: Create GitHub Release and upload EXE
        run: |
          gh release create latest `
            --title "Latest Release" `
            --notes "Auto-built installer. Download and run to install SpotyTangoDisplay on Windows." `
            --latest `
            installer\SpotyTangoDisplay-Setup.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

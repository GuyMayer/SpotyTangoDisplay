<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <!-- Background -->
  <rect width="320" height="120" fill="#1a0a2e" rx="8"/>

  <!-- Decorative rule lines -->
  <line x1="20" y1="30" x2="300" y2="30" stroke="#c8a96e" stroke-width="0.5" opacity="0.4"/>
  <line x1="20" y1="90" x2="300" y2="90" stroke="#c8a96e" stroke-width="0.5" opacity="0.4"/>

  <!-- Small diamond ornament left -->
  <polygon points="20,60 28,52 36,60 28,68" fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.6"/>

  <!-- Small diamond ornament right -->
  <polygon points="284,60 292,52 300,60 292,68" fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.6"/>

  <!-- Main wordmark -->
  <text
    x="160" y="56"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="bold"
    fill="#c8a96e"
    text-anchor="middle"
    letter-spacing="4"
  >TANGO</text>

  <text
    x="160" y="82"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    font-weight="normal"
    fill="#eeeeee"
    text-anchor="middle"
    letter-spacing="6"
  >PASSION</text>
</svg>

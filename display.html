<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TangoPassion Display</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/display.css">
</head>
<body>

  <!-- Background -->
  <div id="bg-layer"></div>

  <!-- Fade transition overlay -->
  <div id="fade-overlay"></div>

  <!-- Connection badge -->
  <div id="connection-badge">Connecting…</div>

  <!-- Branding (DJ name + logo) -->
  <div id="branding" class="bottom-right">
    <img id="branding-logo" src="" alt="" style="display:none">
    <span id="branding-name"></span>
  </div>

  <!-- Main content -->
  <div id="content">

    <!-- Idle -->
    <div id="idle-screen" class="hidden">
      <img id="idle-logo" src="" alt="" style="display:none">
      <div id="idle-message">Welcome</div>
      <div id="idle-dj-name"></div>
    </div>

    <!-- Dance track -->
    <div id="track-screen" class="hidden">
      <div id="lesson-left" class="lesson-panel">
        <div class="lesson-label">Orchestra</div>
        <div id="lesson-orch-name"></div>
        <div id="lesson-orch-nickname"></div>
        <div id="lesson-orch-era"></div>
        <div id="lesson-orch-style"></div>
        <ul id="lesson-orch-chars"></ul>
        <div id="lesson-orch-singers"></div>
      </div>
      <div id="track-main">
        <div id="artwork-wrap"><img id="artwork" src="" alt="" width="200" height="200" style="display:none"></div>
        <div id="track-artist"></div>
        <div id="track-title"></div>
        <div id="track-translation"></div>
        <div id="track-genre"></div>
        <div id="track-year"></div>
        <div id="tanda-counter"></div>
      </div>
      <div id="lesson-right" class="lesson-panel">
        <div class="lesson-label">About this song</div>
        <div id="lesson-story"></div>
        <div id="lesson-themes"></div>
      </div>
      <div id="track-next" class="hidden">
        <div id="track-next-header"></div>
        <div id="track-next-detail"></div>
      </div>
    </div>

    <!-- Cortina -->
    <div id="cortina-screen" class="hidden">
      <div id="cortina-label">CORTINA</div>
      <div id="cortina-artist"></div>
      <div id="cortina-title"></div>
      <div id="coming-up" class="hidden">
        <div id="coming-up-header">Coming Up</div>
        <div id="coming-up-artist"></div>
        <div id="coming-up-genre"></div>
      </div>
    </div>

  </div>

  <!-- DJ message overlay -->
  <div id="dj-message-overlay" class="hidden">
    <div id="dj-message-text"></div>
  </div>

  <!-- Local video background controls -->
  <input type="file" id="local-video-input" accept="video/*" multiple style="display:none">
  <button id="local-video-btn" title="Load local videos as looping background">🎬</button>

  <!-- AudD live recognition indicator -->
  <div id="live-indicator" class="live-indicator off" style="display:none"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/profiles.js"></script>
  <script src="js/tango-db.js"></script>
  <script src="js/audd.js"></script>
  <script src="js/lastfm.js"></script>
  <script src="js/pusher.js"></script>
  <script src="js/display.js"></script>
</body>
</html>
